<?xml version="1.0" encoding="UTF-8"?>
<!--
  LOGO PLACEHOLDER — GLOBAL SECURE & TRANSPORT
  >>> À REMPLACER PAR LE CLIENT <<<
  Déposez ici le logo officiel (même nom : logo.svg) pour qu'il soit pris en
  compte automatiquement partout où ce fichier est référencé.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="48" viewBox="0 0 240 48" fill="none" role="img" aria-label="Global Secure & Transport">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9c7d3a"/>
      <stop offset="50%" stop-color="#e2c987"/>
      <stop offset="100%" stop-color="#c5a253"/>
    </linearGradient>
  </defs>
  <text x="0" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="600" letter-spacing="0.5" fill="url(#gold)">GLOBAL SECURE</text>
  <text x="0" y="40" font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="3" fill="#f5f3ee" opacity="0.85">&amp; TRANSPORT</text>
</svg>
